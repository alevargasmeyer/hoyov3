<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOYO 19 — Informe Interactivo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⛏️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.7/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;--surface:#111623;--surface2:#161c2c;--surface3:#1c2336;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#e4e8f1;--text2:#8b93a7;--text3:#5a6278;
  --gold:#e8b830;--gold2:#f5cc40;--gold-dim:rgba(232,184,48,.08);
  --green:#4ade80;--green-dim:rgba(74,222,128,.08);
  --red:#f87171;--red-dim:rgba(248,113,113,.08);
  --blue:#60a5fa;--orange:#fb923c;
  --sidebar-w:300px;--topbar-h:56px;
}
html{scroll-behavior:smooth;font-size:15px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:rgba(11,15,26,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;z-index:100;gap:12px}
.topbar .logo{font-weight:800;font-size:.95rem;color:var(--gold);letter-spacing:2px}
.topbar .sep{color:var(--text3);font-size:.7rem}
.topbar .page-title{color:var(--text2);font-size:.82rem;font-weight:500}
.topbar .back{color:var(--text3);font-size:.78rem;display:flex;align-items:center;gap:4px;transition:color .2s}
.topbar .back:hover{color:var(--text)}
.topbar .spacer{flex:1}
.toggle{display:flex;background:var(--surface2);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.toggle button{padding:8px 20px;font-family:inherit;font-size:.8rem;font-weight:600;border:none;cursor:pointer;transition:all .25s;color:var(--text3);background:transparent}
.toggle button.on{background:var(--gold);color:var(--bg)}
.toggle button:hover:not(.on){color:var(--text)}

/* ── SIDEBAR ── */
.sidebar{position:fixed;top:var(--topbar-h);left:0;width:var(--sidebar-w);height:calc(100vh - var(--topbar-h));background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:90;transition:transform .3s}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.sidebar-inner{padding:16px 0 40px}
.ns{margin-bottom:2px}
.ns-title{display:flex;align-items:center;padding:10px 18px;font-size:.76rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;gap:8px;user-select:none}
.ns-title:hover{color:var(--text);background:var(--surface2)}
.ns-title .n{color:var(--gold);font-size:.7rem;font-weight:700;min-width:20px}
.ns-title .arr{margin-left:auto;font-size:.6rem;transition:transform .2s;color:var(--text3)}
.ns-title.open .arr{transform:rotate(90deg)}
.ni-list{display:none;padding:0 0 6px}
.ni-list.open{display:block}
.ni{display:block;padding:5px 18px 5px 46px;font-size:.73rem;color:var(--text3);cursor:pointer;transition:all .12s;line-height:1.5}
.ni:hover{color:var(--text);background:rgba(232,184,48,.04)}
.ni.active{color:var(--gold);background:var(--gold-dim);border-right:2px solid var(--gold)}

/* ── MAIN ── */
.main{margin-left:var(--sidebar-w);margin-top:var(--topbar-h);min-height:calc(100vh - var(--topbar-h))}
.content{max-width:920px;margin:0 auto;padding:40px 40px 120px}

/* ── KPI CARDS ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:40px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 16px;transition:all .3s}
.kpi:hover{border-color:rgba(232,184,48,.2);transform:translateY(-2px)}
.kpi-label{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.kpi-val{font-size:1.5rem;font-weight:800;transition:all .4s}
.kpi-val.g{color:var(--green)}.kpi-val.w{color:var(--orange)}.kpi-val.d{color:var(--text)}
.kpi-sub{font-size:.68rem;color:var(--text3);margin-top:4px}

/* ── PILLS ── */
.pills{display:flex;gap:10px;margin-bottom:40px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:.75rem;font-weight:500;border:1px solid}
.pill.r{background:rgba(96,165,250,.06);border-color:rgba(96,165,250,.15);color:var(--blue)}
.pill.b{background:var(--red-dim);border-color:rgba(248,113,113,.15);color:var(--red)}
.pill.s{background:var(--gold-dim);border-color:rgba(232,184,48,.15);color:var(--gold)}

/* ── SECTIONS ── */
.sec{margin-bottom:56px;scroll-margin-top:calc(var(--topbar-h) + 20px)}
.sec-badge{display:inline-block;font-size:.65rem;font-weight:700;color:var(--gold);background:var(--gold-dim);padding:3px 10px;border-radius:5px;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase}
.sec h2{font-size:1.4rem;font-weight:700;margin-bottom:8px}
.sec .intro{color:var(--text2);font-size:.86rem;margin-bottom:24px;max-width:660px}
.sub{margin-bottom:24px;padding:22px;background:var(--surface);border:1px solid var(--border);border-radius:12px;transition:border-color .2s}
.sub:hover{border-color:var(--border2)}
.sub h3{font-size:.95rem;font-weight:600;margin-bottom:8px}
.sub h4{font-size:.84rem;font-weight:600;color:var(--gold);margin-bottom:6px;margin-top:14px}
.sub p{color:var(--text2);font-size:.82rem;line-height:1.75;margin-bottom:8px}
.sub ul{padding-left:18px;margin-bottom:8px}
.sub li{color:var(--text2);font-size:.82rem;line-height:1.7;margin-bottom:3px}
.sub li::marker{color:var(--gold)}

/* ── CHARTS ── */
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin:20px 0}
.chart-box .chart-title{font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:14px}
.chart-box canvas{max-height:300px}

/* ── FLOW ── */
.flow{display:flex;align-items:center;gap:0;margin:18px 0;flex-wrap:wrap;justify-content:center}
.flow-n{padding:10px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:.76rem;font-weight:500;text-align:center;min-width:100px}
.flow-n.hl{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.flow-a{color:var(--text3);font-size:.9rem;padding:0 4px}

/* ── COMPARE TABLE ── */
.ctable{width:100%;border-collapse:collapse;margin:14px 0}
.ctable th{text-align:left;padding:9px 12px;font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);font-weight:600}
.ctable td{padding:9px 12px;font-size:.8rem;color:var(--text2);border-bottom:1px solid var(--border)}
.ctable td:first-child{font-weight:500;color:var(--text)}
.vb{color:var(--red)}.vg{color:var(--green)}

/* ── RISK GRID ── */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.rcard{padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2)}
.rcard .rt{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:4px}
.rcard .rt.o{color:var(--orange)}.rcard .rt.e{color:var(--red)}.rcard .rt.l{color:var(--blue)}.rcard .rt.x{color:var(--gold)}
.rcard .rv{font-size:1rem;font-weight:800;margin-bottom:3px}
.rcard .rd{font-size:.72rem;color:var(--text3);line-height:1.5}

/* ── REC GRID ── */
.recgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.rec{padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);transition:all .2s}
.rec:hover{border-color:rgba(232,184,48,.2);transform:translateY(-1px)}
.rec .rn{font-size:.68rem;color:var(--gold);font-weight:700}
.rec .rtt{font-size:.8rem;font-weight:600;margin:3px 0}
.rec .rdd{font-size:.72rem;color:var(--text3);line-height:1.5}

/* ── FOOTER ── */
.foot{padding:36px;text-align:center;border-top:1px solid var(--border);color:var(--text3);font-size:.76rem}

/* ── MOBILE ── */
.mob-btn{display:none;position:fixed;top:12px;right:14px;z-index:110;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:1rem;cursor:pointer}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0}.content{padding:28px 18px 120px}
  .kpis{grid-template-columns:1fr 1fr}.mob-btn{display:block}
  .recgrid,.rgrid{grid-template-columns:1fr}
}
@media(max-width:500px){.kpis{grid-template-columns:1fr}.pills{flex-direction:column}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="../index.html" class="logo">HOYO19</a>
  <span class="sep">|</span>
  <span class="page-title">Informe interactivo</span>
  <a href="../index.html" class="back">← Inicio</a>
  <div class="spacer"></div>
  <div class="toggle">
    <button class="on" id="bAct" onclick="setS('a')">Actual</button>
    <button id="bOpt" onclick="setS('o')">Optimizado</button>
  </div>
</div>
<button class="mob-btn" onclick="document.getElementById('sb').classList.toggle('open')">☰</button>

<!-- SIDEBAR -->
<nav class="sidebar" id="sb">
<div class="sidebar-inner" id="sidebar-nav"></div>
</nav>

<!-- MAIN -->
<div class="main">
<div class="content">

<!-- KPIs -->
<div class="kpis">
  <div class="kpi"><div class="kpi-label">Costo logístico</div><div class="kpi-val d" id="k1">$587/t</div><div class="kpi-sub">USD por tonelada</div></div>
  <div class="kpi"><div class="kpi-label">Tiempo total</div><div class="kpi-val d" id="k2">75 días</div><div class="kpi-sub">Extracción → destino</div></div>
  <div class="kpi"><div class="kpi-label">Proveedores</div><div class="kpi-val w" id="k3">1</div><div class="kpi-sub">Agentes de carga</div></div>
  <div class="kpi"><div class="kpi-label">Visibilidad</div><div class="kpi-val w" id="k4">35%</div><div class="kpi-sub">Control operativo</div></div>
</div>

<div class="pills">
  <div class="pill r">◉ Ruta — <span id="p1">Potosí → Cochabamba → Arica</span></div>
  <div class="pill b">◉ Cuello de botella — <span id="p2">Acopio en Chilcobija</span></div>
  <div class="pill s">◉ Escenario — <span id="p3">Operación actual</span></div>
</div>

<!-- ══ ALL SECTIONS ══ -->
<div id="sections-container"></div>

</div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const NAV = [
  {id:'1',t:'Introducción',items:[
    {id:'1-1',t:'1.1 Contexto minero-exportador'},{id:'1-2',t:'1.2 Importancia del transporte'},{id:'1-3',t:'1.3 Problemática actual'},
    {id:'1-4',t:'1.4 Objetivo general'},{id:'1-5',t:'1.5 Objetivos específicos'},{id:'1-6',t:'1.6 Alcance y limitaciones'},{id:'1-7',t:'1.7 Metodología'}]},
  {id:'2',t:'Marco Conceptual',items:[
    {id:'2-1',t:'2.1 Cadena de suministro'},{id:'2-2',t:'2.2 Conceptos clave'},{id:'2-3',t:'2.3 Tipos de transporte'},{id:'2-4',t:'2.4 Incoterms'},{id:'2-5',t:'2.5 Costos logísticos'}]},
  {id:'3',t:'Diagnóstico Actual',items:[
    {id:'3-1',t:'3.1 Flujo logístico'},{id:'3-2',t:'3.2 Rutas de transporte'},{id:'3-3',t:'3.3 Infraestructura'},{id:'3-4',t:'3.4 Actores involucrados'},
    {id:'3-5',t:'3.5 Tiempos de transporte'},{id:'3-6',t:'3.6 Costos actuales'},{id:'3-7',t:'3.7 Cuellos de botella'},{id:'3-8',t:'3.8 Ineficiencias'}]},
  {id:'4',t:'Análisis de Transporte',items:[
    {id:'4-1',t:'4.1 Mina → Planta'},{id:'4-2',t:'4.2 Planta → Exportación'},{id:'4-3',t:'4.3 Logística en frontera'},
    {id:'4-4',t:'4.4 Transporte internacional'},{id:'4-5',t:'4.5 Comparación entre rutas'},{id:'4-6',t:'4.6 Evaluación de riesgos'}]},
  {id:'5',t:'Costos y Análisis Económico',items:[
    {id:'5-1',t:'5.1 Estructura de costos'},{id:'5-2',t:'5.2 Costos por transporte'},{id:'5-3',t:'5.3 Costos por ruta'},
    {id:'5-4',t:'5.4 Impacto en precio final'},{id:'5-5',t:'5.5 Análisis de eficiencia'},{id:'5-6',t:'5.6 Sensibilidad'}]},
  {id:'6',t:'Problemática',items:[
    {id:'6-1',t:'6.1 Infraestructura'},{id:'6-2',t:'6.2 Accesibilidad'},{id:'6-3',t:'6.3 Aduanas'},
    {id:'6-4',t:'6.4 Costos'},{id:'6-5',t:'6.5 Intermediarios'},{id:'6-6',t:'6.6 Riesgos'},{id:'6-7',t:'6.7 Falta de optimización'}]},
  {id:'7',t:'HOYO19 CORE',items:[
    {id:'7-1',t:'7.1 Objetivo del servicio'},{id:'7-2',t:'7.2 Alcance'},{id:'7-3',t:'7.3 Cliente objetivo'},
    {id:'7-4',t:'7.4 Metodología'},{id:'7-5',t:'7.5 Etapas'},{id:'7-6',t:'7.6 Herramientas'}]},
  {id:'8',t:'Estrategias de Optimización',items:[
    {id:'8-1',t:'8.1 Optimización de rutas'},{id:'8-2',t:'8.2 Reducción de costos'},{id:'8-3',t:'8.3 Mejora de tiempos'},
    {id:'8-4',t:'8.4 Integración logística'},{id:'8-5',t:'8.5 Tecnología'},{id:'8-6',t:'8.6 Consolidación'},{id:'8-7',t:'8.7 Negociación'}]},
  {id:'9',t:'Propuesta de Mejora',items:[
    {id:'9-1',t:'9.1 Rediseño logístico'},{id:'9-2',t:'9.2 Selección de rutas'},{id:'9-3',t:'9.3 Coordinación'},
    {id:'9-4',t:'9.4 Reducción de costos'},{id:'9-5',t:'9.5 KPIs'},{id:'9-6',t:'9.6 Plan de implementación'}]},
  {id:'10',t:'Evaluación de Impacto',items:[
    {id:'10-1',t:'10.1 Beneficios económicos'},{id:'10-2',t:'10.2 Reducción de costos'},{id:'10-3',t:'10.3 Mejora de tiempos'},
    {id:'10-4',t:'10.4 Eficiencia'},{id:'10-5',t:'10.5 Competitividad'}]},
  {id:'11',t:'Análisis de Riesgos',items:[
    {id:'11-1',t:'11.1 Operativos'},{id:'11-2',t:'11.2 Económicos'},{id:'11-3',t:'11.3 Logísticos'},{id:'11-4',t:'11.4 Mitigación'}]},
  {id:'12',t:'Caso Práctico',items:[
    {id:'12-1',t:'12.1 Empresa'},{id:'12-2',t:'12.2 Situación inicial'},{id:'12-3',t:'12.3 Diagnóstico'},
    {id:'12-4',t:'12.4 Propuesta'},{id:'12-5',t:'12.5 Resultados'},{id:'12-6',t:'12.6 Antes/Después'}]},
  {id:'13',t:'Conclusiones',items:[
    {id:'13-1',t:'13.1 Hallazgos'},{id:'13-2',t:'13.2 Importancia del transporte'},{id:'13-3',t:'13.3 Evaluación del servicio'}]},
  {id:'14',t:'Recomendaciones',items:[{id:'14-1',t:'14.1–14.6 Todas'}]},
  {id:'15',t:'Bibliografía',items:[{id:'15-1',t:'15.1 Fuentes'}]},
];

// Build sidebar
const sbHTML = NAV.map((s,i)=>`<div class="ns">
  <div class="ns-title${i===0?' open':''}" onclick="togN(this)"><span class="n">${String(i+1).padStart(2,'0')}</span>${s.t}<span class="arr">▸</span></div>
  <div class="ni-list${i===0?' open':''}">${s.items.map(it=>`<a class="ni" href="#s${it.id}">${it.t}</a>`).join('')}</div>
</div>`).join('');
document.getElementById('sidebar-nav').innerHTML=sbHTML;

function togN(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}
document.querySelectorAll('.ni').forEach(n=>n.addEventListener('click',()=>{if(innerWidth<=900)document.getElementById('sb').classList.remove('open')}));

// ═══════════════════════════════════════════
// SECTION CONTENT (condensed for file size — all 16 sections)
// ═══════════════════════════════════════════
const SC = {
'1-1':{h:'Contexto del sector minero-exportador',p:'El sector minero-exportador es pilar fundamental en Bolivia. Minerales como el antimonio son estratégicos por sus aplicaciones en retardantes de llama, baterías y aleaciones. China lidera la producción mundial, generando competencia para otros productores. Bolivia tiene reservas importantes pero la eficiencia operativa y la integración con mercados internacionales son clave.'},
'1-2':{h:'Importancia del transporte en la cadena de valor minera',p:'El transporte conecta la mina con el cliente final. En minería, mover el producto eficientemente cambia por completo los márgenes del negocio porque afecta costo, tiempo, riesgo y cumplimiento. La optimización de rutas y coordinación puede generar reducciones significativas.'},
'1-3':{h:'Problemática actual en la logística de exportación',p:'La logística opera bajo estructuras fragmentadas con múltiples actores sin integración óptima. Hay dependencia de rutas específicas, vulnerabilidad a eventos externos y ausencia de planificación optimizada. Todo genera tiempos largos, sobrecostos y menor competitividad.'},
'1-4':{h:'Objetivo general',p:'Analizar la cadena logística de exportación de minerales con énfasis en transporte, para identificar ineficiencias, evaluar su impacto y proponer estrategias de optimización.'},
'1-5':{h:'Objetivos específicos',p:'Entender el contexto sectorial, evaluar el rol del transporte, identificar limitaciones, analizar el flujo actual y proponer estrategias concretas de optimización.'},
'1-6':{h:'Alcance y limitaciones',p:'Se enfoca en la exportación de antimonio de HOYO19 S.R.L. desde extracción hasta exportación. Limitaciones: variabilidad de volumen, dependencia de proveedores, información parcial.'},
'1-7':{h:'Metodología',p:'Combina información técnica del sector con datos operativos del caso HOYO19. Análisis estructurado que identifica cuellos de botella, evalúa impactos y diseña propuestas.'},
'2-1':{h:'Cadena de suministro en la minería',p:'Va desde la extracción hasta la entrega al cliente: acopio → concentración → transporte interno → exportación → distribución. Es un sistema interdependiente donde cualquier ineficiencia afecta el desempeño global.',chart:'flow'},
'2-2':{h:'Conceptos clave de logística y transporte',p:'Logística = planificar y controlar el flujo del producto. Costo logístico incluye transporte, almacenamiento, seguros, aduanas y coordinación. En minería estos costos pueden ser proporción significativa del valor del producto.'},
'2-3':{h:'Tipos de transporte',p:'Terrestre (camiones): el más usado en etapas iniciales. Marítimo: principal medio para exportación internacional. Multimodal: combinación de medios donde la eficiencia depende de la coordinación entre tramos.'},
'2-4':{h:'Incoterms aplicados a minerales',p:'FOB = responsabilidad del vendedor hasta carga en buque. CIF = incluye transporte y seguro hasta puerto de destino. La selección impacta directamente la estructura de costos y gestión de riesgos.'},
'2-5':{h:'Costos logísticos y su impacto en la rentabilidad',p:'El transporte suele ser la mayor proporción de los costos logísticos totales, especialmente con distancias largas e infraestructura limitada. La optimización genera mejoras directas en rentabilidad.'},
'3-1':{h:'Flujo logístico actual',p:'Sistema secuencial: extracción (~2%) → acopio Chilcobija → concentración Sayari (~85%) → transporte terrestre → Puerto Arica → marítimo → Houston. Tiempo total: ~75 días. Distancia terrestre: 1,171–1,200 km.',chart:'flow'},
'3-2':{h:'Rutas de transporte',p:'Ruta principal: Potosí → Cochabamba (~407 km) → Arica (~780 km vía Oruro y Tambo Quemado). Existen alternativas no plenamente desarrolladas.',chart:'distances'},
'3-3':{h:'Infraestructura disponible',p:'Carreteras con estado variable por lluvias, mantenimiento y conflictos sociales. Tramos secundarios con limitaciones. Puerto de Arica como punto de salida principal.'},
'3-4':{h:'Actores involucrados',p:'Proveedores de mineral, centros de acopio (Chilcobija, Sayari), transportistas (EZ Logistics), agentes de carga, agentes aduaneros, intermediarios y clientes finales en EE.UU.'},
'3-5':{h:'Tiempos de transporte',p:'Mina → Chilcobija: 20–25 días. Chilcobija → Sayari: 15 días. Transporte → exportación: ~36 días. Retrasos recurrentes en acopio por dependencia de proveedores.',chart:'times'},
'3-6':{h:'Costos actuales',p:'Mina → Planta: ~32 USD/t. Planta → Puerto: ~2,643 USD/contenedor. Marítimo: ~6,274 USD/envío. Seguros: 0.07 del valor. Regalías: ~5%.',chart:'costs'},
'3-7':{h:'Cuellos de botella',p:'Principal cuello de botella: acopio en Chilcobija. Dependencia de proveedores y disponibilidad de mineral genera retrasos en consolidación. Centralización del procesamiento reduce flexibilidad.'},
'3-8':{h:'Ineficiencias del sistema',p:'Dependencia de pocos proveedores, rutas poco diversificadas, pocos agentes de carga, costos altos, sin herramientas tecnológicas, procesos de acopio ineficientes.'},

const container = document.getElementById('sections-container');
let html = '';
let lastSection = '';

for(const [key, val] of Object.entries(SC)){
  const sNum = key.split('-')[0];
  const secName = NAV.find(n=>n.id===sNum)?.t||'';
  
  // New section header
  if(sNum !== lastSection){
    html += `<div class="sec" id="s${key}"><div class="sec-badge">Sección ${sNum}</div><h2>${secName.toUpperCase()}</h2>`;
    lastSection = sNum;
  } else {
    html += `<div class="sec" id="s${key}">`;
  }
  
  html += `<div class="sub"><h3>${val.h}</h3><p>${val.p}</p></div>`;
  
  // Charts
  if(val.chart==='flow') html += `<div class="flow"><div class="flow-n">Extracción<br><small style="color:var(--text3)">~2%</small></div><div class="flow-a">→</div><div class="flow-n hl">Acopio<br><small>Chilcobija</small></div><div class="flow-a">→</div><div class="flow-n">Concentración<br><small>Sayari ~85%</small></div><div class="flow-a">→</div><div class="flow-n">Terrestre<br><small>~1,187 km</small></div><div class="flow-a">→</div><div class="flow-n">Arica</div><div class="flow-a">→</div><div class="flow-n">Houston</div></div>`;
  if(val.chart==='distances') html += `<div class="chart-box"><div class="chart-title">Distancias por tramo (km)</div><canvas id="chDist"></canvas></div>`;
  if(val.chart==='times') html += `<div class="chart-box"><div class="chart-title">Tiempos por etapa (días)</div><canvas id="chTime"></canvas></div>`;
  if(val.chart==='costs'||val.chart==='costs_bar') html += `<div class="chart-box"><div class="chart-title">Costos por tipo de transporte (USD/t)</div><canvas id="chCost"></canvas></div>`;
  if(val.chart==='costs_pie') html += `<div class="chart-box"><div class="chart-title">Distribución de costos logísticos</div><canvas id="chPie"></canvas></div>`;
  if(val.chart==='risks') html += `<div class="rgrid"><div class="rcard"><div class="rt o">Operativos</div><div class="rv" id="rO">Alto</div><div class="rd">Retrasos, descoordinación, dependencia</div></div><div class="rcard"><div class="rt e">Económicos</div><div class="rv" id="rE">Alto</div><div class="rd">Costos altos, tarifas volátiles</div></div><div class="rcard"><div class="rt l">Logísticos</div><div class="rv" id="rL">Alto</div><div class="rd">Ruta única, sin alternativas</div></div><div class="rcard"><div class="rt x">Externos</div><div class="rv" id="rX">Medio-Alto</div><div class="rd">Clima, conflictos, infraestructura</div></div></div>`;
  if(val.chart==='sensitivity') html += `<div class="chart-box"><div class="chart-title">Sensibilidad del costo logístico</div><canvas id="chSens"></canvas></div>`;
  if(val.chart==='comparison') html += `<div class="chart-box"><div class="chart-title">Actual vs. Optimizado</div><canvas id="chComp"></canvas></div>`;
  if(val.chart==='beforeafter') html += `<div class="chart-box"><div class="chart-title">Comparación antes/después</div><table class="ctable"><tr><th>Dimensión</th><th style="color:var(--red)">Antes</th><th style="color:var(--green)">Después</th></tr><tr><td>Proveedores</td><td>Pocos</td><td>Red diversificada</td></tr><tr><td>Acopio</td><td>Nodo único</td><td>Multi-punto</td></tr><tr><td>Agentes de carga</td><td>1</td><td>3+</td></tr><tr><td>Costos logísticos</td><td class="vb">~$587/t</td><td class="vg">~$470/t</td></tr><tr><td>Tiempo total</td><td class="vb">75 días</td><td class="vg">55–60 días</td></tr><tr><td>Visibilidad</td><td class="vb">35%</td><td class="vg">80%+</td></tr><tr><td>Herramientas</td><td>Ninguna propia</td><td>Dashboard + KPIs</td></tr></table></div>`;
  if(val.chart==='recs') html += buildRecs();
  
  html += '</div>';
}

// Footer
html += `<div class="foot"><div style="font-weight:800;color:var(--gold);letter-spacing:2px;margin-bottom:6px">HOYO19</div><p>Exportadora Minera | La Paz, Bolivia | Abril 2026</p></div>`;

function buildRecs(){
  const recs = [
    {c:'Estratégicas',items:[{n:1,t:'Centralizar gestión logística',d:'Control tower en tiempo real'},{n:2,t:'Planificación por demanda',d:'Forecast, no esperar carga'},{n:3,t:'Relaciones estratégicas',d:'Acuerdos a mediano plazo'},{n:4,t:'Logística como ventaja competitiva',d:'Diferenciación en el sector'}]},
    {c:'Operativas',items:[{n:5,t:'Diversificar acopio',d:'2–3 centros alternativos'},{n:6,t:'Diversificar proveedores',d:'Ampliar red de abastecimiento'},{n:7,t:'Consolidación sistemática',d:'Maximizar contenedores'},{n:8,t:'Flujo continuo',d:'Sin pausas entre etapas'},{n:9,t:'Reducir intermediarios',d:'Eliminar costos sin valor'}]},
    {c:'Tecnológicas',items:[{n:10,t:'Tracking propio',d:'GPS y plataformas logísticas'},{n:11,t:'Dashboard logístico',d:'Costo/t, tiempo/tramo en tiempo real'},{n:12,t:'Simulación de rutas',d:'Comparar antes de ejecutar'},{n:13,t:'Base de datos histórica',d:'Mejora continua real'}]},
    {c:'Financieras',items:[{n:14,t:'Negociar por volumen',d:'Mejores tarifas consolidando'},{n:15,t:'Reducir capital inmovilizado',d:'Menos tiempo = más liquidez'},{n:16,t:'Estandarizar costos/t',d:'Benchmark de costo objetivo'}]},
    {c:'Logísticas avanzadas',items:[{n:17,t:'Rutas alternativas',d:'Perú, otros puertos'},{n:18,t:'Hub logístico',d:'Centros estratégicos'},{n:19,t:'Co-loading',d:'Compartir contenedores'},{n:20,t:'Pre-negociar slots',d:'Espacio asegurado en barcos'}]},
    {c:'Mejora HOYO19',items:[{n:21,t:'CORE como producto',d:'Qué incluye, cuánto cuesta'},{n:22,t:'Data & analytics',d:'Medir y mostrar resultados'},{n:23,t:'Case studies',d:'Documentar antes/después'},{n:24,t:'Posicionar como experto',d:'Nicho en logística minera'},{n:25,t:'Escalar a otros minerales',d:'Zinc, plata, etc.'}]}
  ];
  let h='';
  recs.forEach(cat=>{
    h+=`<h4 style="color:var(--gold);margin:20px 0 12px;font-size:.86rem">${cat.c}</h4><div class="recgrid">`;
    cat.items.forEach(r=>{h+=`<div class="rec"><div class="rn">#${r.n}</div><div class="rtt">${r.t}</div><div class="rdd">${r.d}</div></div>`});
    h+='</div>';
  });
  return h;
}

let sc='a';
function setS(s){
  sc=s;
  document.getElementById('bAct').classList.toggle('on',s==='a');
  document.getElementById('bOpt').classList.toggle('on',s==='o');
  upd();
}

function upd(){
  const o=sc==='o';
  // KPIs
  document.getElementById('k1').textContent=o?'$470/t':'$587/t';
  document.getElementById('k1').className='kpi-val '+(o?'g':'d');
  document.getElementById('k2').textContent=o?'57 días':'75 días';
  document.getElementById('k2').className='kpi-val '+(o?'g':'d');
  document.getElementById('k3').textContent=o?'3+':'1';
  document.getElementById('k3').className='kpi-val '+(o?'g':'w');
  document.getElementById('k4').textContent=o?'80%':'35%';
  document.getElementById('k4').className='kpi-val '+(o?'g':'w');
  // Pills
  document.getElementById('p1').textContent=o?'Rutas diversificadas':'Potosí → Cochabamba → Arica';
  document.getElementById('p2').textContent=o?'Mitigado (multi-punto)':'Acopio en Chilcobija';
  document.getElementById('p3').textContent=o?'Escenario optimizado':'Operación actual';
  // Risks
  const rO=document.getElementById('rO'),rE=document.getElementById('rE'),rL=document.getElementById('rL'),rX=document.getElementById('rX');
  if(rO){rO.textContent=o?'Medio':'Alto';rE.textContent=o?'Medio':'Alto';rL.textContent=o?'Medio-Bajo':'Alto';rX.textContent=o?'Medio':'Medio-Alto'}
  // Update chart data
  if(charts.chTime){
    charts.chTime.data.datasets[0].backgroundColor=o?['rgba(248,113,113,.3)','rgba(251,146,60,.3)','rgba(96,165,250,.3)']:[R,O,B];
    charts.chTime.data.datasets[1].backgroundColor=o?[R,O,B]:['rgba(248,113,113,.3)','rgba(251,146,60,.3)','rgba(96,165,250,.3)'];
    charts.chTime.update();
  }
  if(charts.chCost){
    charts.chCost.data.datasets[0].backgroundColor=o?['rgba(232,184,48,.3)','rgba(96,165,250,.3)','rgba(248,113,113,.3)']:[G,B,R];
    charts.chCost.data.datasets[1].backgroundColor=o?[G,B,R]:['rgba(232,184,48,.3)','rgba(96,165,250,.3)','rgba(248,113,113,.3)'];
    charts.chCost.update();
  }
  if(charts.chPie){
    charts.chPie.data.datasets[0].data=o?[28,140,302]:[32,165,390];
    charts.chPie.data.labels=o?['Mina→Planta ($28)','Terrestre ($140)','Marítimo ($302)']:['Mina→Planta ($32)','Terrestre ($165)','Marítimo ($390)'];
    charts.chPie.update();
  }
}

// Scroll spy
const secs=document.querySelectorAll('.sec[id]');
const nis=document.querySelectorAll('.ni');
const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){const id=e.target.id;nis.forEach(n=>{n.classList.toggle('active',n.getAttribute('href')==='#'+id)})}})},{rootMargin:'-70px 0px -60% 0px',threshold:0});
secs.forEach(s=>obs.observe(s));
</script>
